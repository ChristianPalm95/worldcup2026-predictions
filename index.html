<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">

  <title>Business Finance - FIFA World Cup 2026 Prediction Challenge</title>

  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

  <!-- NAV BUTTONS -->
  <div style="display:flex; gap:10px; justify-content:center; margin:20px 0;">
    <button onclick="showPredictions()">Predictions</button>
    <button onclick="showLeaderboard()">Leaderboard</button>
  </div>

  <!-- HEADER -->
  <header class="hero">
    <h1>🏆 Business Finance</h1>
    <h2>FIFA World Cup 2026 Prediction Challenge</h2>
  </header>

  <!-- PREDICTIONS VIEW -->
  <div id="predictionsView">

    <section class="card">
      <label>Select your name</label>
      <select id="playerSelect">
        <option value="">Choose player...</option>
      </select>
    </section>

    <section class="card">
      <h2>Bonus Questions</h2>

      <label>World Champion (10 pts)</label>
      <input id="worldChampion" type="text">

      <label>Golden Boot Winner (5 pts)</label>
      <input id="goldenBoot" type="text">

      <label>Top Scoring Team (3 pts)</label>
      <input id="topScoringTeam" type="text">
    </section>

    <section class="card">
      <h2>Group Stage Matches</h2>
      <div id="groupsContainer"></div>
    </section>

    <section class="card">
      <h2>Knockout Stage</h2>
      ...
    </section>

    <section class="card">
      <button id="saveBtn">Save Prediction</button>
      <div id="saveStatus"></div>
    </section>

  </div>

  <!-- LEADERBOARD VIEW -->
 <div id="leaderboardView" style="display:none;">

  <section
    class="card"
    style="
      max-width:800px;
      margin:0 auto;
    "
  >
      <h2>Leaderboard 🏆</h2>
      <div id="leaderboard">Loading...</div>
    </section>
  </div>

  <!-- SCRIPTS -->
  <script src="js/config.js"></script>
  <script src="js/groups.js"></script>
  <script src="js/matches.js"></script>
  <script src="js/api.js"></script>
  <script src="standings.js"></script>
  <script src="js/app.js"></script>

  <script>

    function showPredictions() {
      document.getElementById("predictionsView").style.display = "block";
      document.getElementById("leaderboardView").style.display = "none";
    }

    function showLeaderboard() {
      document.getElementById("predictionsView").style.display = "none";
      document.getElementById("leaderboardView").style.display = "block";
      loadLeaderboard();
    }

    async function loadLeaderboard() {

      const container = document.getElementById("leaderboard");

      try {
        container.innerHTML = "Loading...";

        const res = await fetch(API_URL);
        const data = await res.json();

        if (!Array.isArray(data)) {
          container.innerHTML = "No data received";
          return;
        }

   let html = `
  <div style="
    display:grid;
grid-template-columns:25px 1fr 50px 50px 60px;
    gap:10px;
    padding:10px;
    font-weight:bold;
    border-bottom:2px solid #ddd;
    margin-bottom:8px;
  ">
    <div>#</div>
    <div>Player</div>
    <div style="text-align:center;">Pts</div>
    <div style="text-align:center;">Exact</div>
    <div style="text-align:center;">Outcome</div>
  </div>
`;

        data.forEach((p, index) => {

          let medal = "";
          if (index === 0) medal = "🥇";
          else if (index === 1) medal = "🥈";
          else if (index === 2) medal = "🥉";

const rowColor =
  index === 0
    ? "#fef3c7"
    : index === 1
    ? "#e5e7eb"
    : index === 2
    ? "#fed7aa"
    : "#f4f4f4";

html += `
  <div style="
    display:grid;
    grid-template-columns:25px 220px 50px 50px 60px;
    gap:6px;
    align-items:center;
    padding:12px;
    margin:6px 0;
    background:${rowColor};
    border-radius:8px;
  ">

    <div>
      <b>${index + 1}</b>
    </div>

 <div>
  ${medal} ${p.player}
</div>

<div style="text-align:center;">
  <b>${p.points}</b>
</div>

<div style="text-align:center;">
  ${p.exactScores}
</div>

<div style="text-align:center;">
  ${p.correctOutcomes}
</div>

  </div>
`;
        });

        container.innerHTML = html;

      } catch (err) {
        console.error(err);
        container.innerHTML = "Error loading leaderboard";
      }
    }
  </script>
  
</body>
</html>
