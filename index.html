<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">

  <title>Business Finance - FIFA World Cup 2026 Prediction Challenge</title>

  <link rel="stylesheet" href="css/styles.css">
</head>

<body>
  <div style="display:flex; gap:10px; justify-content:center; margin:20px 0;">
  <button onclick="showPredictions()">Predictions</button>
  <button onclick="showLeaderboard()">Leaderboard</button>
</div>

<header class="hero">
  <h1>🏆 Business Finance</h1>
  <h2>FIFA World Cup 2026 Prediction Challenge</h2>
</header>

<div id="predictionsView">
<section class="card">

  <label>Select your name</label>

  <select id="playerSelect">
    <option value="">Choose player...</option>
  </select>

</section>

<section class="card">

  <h2>Bonus Questions</h2>

  <label>World Champion (10 pts)</label>
  <input id="worldChampion" type="text">

  <label>Golden Boot Winner (5 pts)</label>
  <input id="goldenBoot" type="text">

  <label>Top Scoring Team (3 pts)</label>
  <input id="topScoringTeam" type="text">

</section>

<section class="card">

  <h2>Group Stage Matches</h2>

  <div id="groupsContainer"></div>

</section>

<section class="card">

  <h2>Knockout Stage</h2>

  ...

</section>

<section class="card">

  <button id="saveBtn">
    Save Prediction
  </button>

  <div id="saveStatus"></div>

</section>

<script src="js/config.js"></script>
<script src="js/groups.js"></script>
<script src="js/matches.js"></script>
<script src="js/api.js"></script>
<script src="standings.js"></script>
<script src="js/app.js"></script>

<script>
async function loadLeaderboard() {

  const url = "https://script.google.com/macros/s/AKfycbzWXhYmtIo5ecM8Obg8PPRmnA262N1uUzTpQmRvYXuRI4jubsWvU2_cn3BiBPGuEmka/exec";

  const res = await fetch(url);
  const data = await res.json();

  let html = "";

  data.forEach((p, index) => {

    let medal = "";
    if (index === 0) medal = "🥇";
    else if (index === 1) medal = "🥈";
    else if (index === 2) medal = "🥉";

    html += `
      <div style="display:flex;justify-content:space-between;padding:8px;margin:6px 0;background:#f4f4f4;border-radius:6px;">
        <div>${medal} ${p.player}</div>
        <div><b>${p.points}</b></div>
      </div>
    `;
  });

  document.getElementById("leaderboard").innerHTML = html;
}
</script>

<script>
function showPredictions() {
  document.getElementById("predictionsView").style.display = "block";
  document.getElementById("leaderboardView").style.display = "none";
}

function showLeaderboard() {
  document.getElementById("predictionsView").style.display = "none";
  document.getElementById("leaderboardView").style.display = "block";
  loadLeaderboard();
}
</script>
  
</body>
</html>

<div id="leaderboardView" style="display:none;">

  <section class="card">

    <h2>Leaderboard 🏆</h2>
    <div id="leaderboard">Loading...</div>

  </section>

</div>
